
<div class="controls">
    <h1>Signal Flow Graph Solver</h1>
    <button [class.active]="state === 'Select'" (click)="select()">👆 Select</button>
    <button [class.active]="state === 'AddNode'" (click)="addNode()">➕ Add Node</button>
    <button [class.active]="state === 'AddEdgeSource' || state === 'AddEdgeTarget'" (click)="addEdge()">🔗 Add Edge</button>
    <button [class.active]="state === 'Delete'" (click)="delete()">🗑️ Delete</button>
</div>

<div #cy class="cy-container"></div>
